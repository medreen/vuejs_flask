    <!-- form -->
    <div class="container" id="app">
      <form id="form" name="form" @submit.prevent="registerUser">
        <div class="mb-3">
          <label for="exampleInputLocation" class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            id="exampleInputName"
            v-model="name"
          />
        </div>
        <div class="mb-3">
          <label for="exampleInputName" class="form-label">Location</label>
          <input
            type="text"
            class="form-control"
            id="exampleInputLocation"
            v-model="location"
          />
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
      </form>

      <div class="my-5">
        <h1>Users</h1>
        <table id="myTable" class="table table-hover">
          <thead>
            <tr>
              <th scope="col">#</th>

              <th scope="col">Name</th>
              <th scope="col">Location</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th scope="row">1</th>

            <tr>

    <!-- jQuery (required by DataTables) -->
    <!-- <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script> -->
    <script

      crossorigin="anonymous"

    ></script>

    <!-- Bootstrap JS -->

    <!-- DataTables JS + Bootstrap 5 integration -->

    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
      integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="

    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.8/axios.js"
      integrity="sha512-+dJa1RvuE8/HFftifMtr7hqixdEkb/DizfXUZAA0pyZeVdNnyZyKy9RnIWi0JSWUznbCNbaQNn0E6nbtrdL+9g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script>
      $(document).ready(function () {
        $("#myTable").DataTable();
      });
    </script>

    <script>
      new Vue({
        el: "#app",
        data: {
          name: "",
          location: "",
        },
        methods: {
          registerUser() {
            if (this.name === "" || this.location === "") {
              alert("All fields required.");
            } else {
              response = axios
                .post("http://127.0.0.1:5000/users", {
                  name: this.name,
                  location: this.location,
                })
                .then((response) => {
                  console.log(response.data);
                })
                .catch((error) => {
                  console.error("Error registering user.", error);
                });
            }
          },
        },
      });
    </script>
  </body>
