<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue</title>
  </head>
  <body>
    <div id="app">
      <form id="form" name="form" @submit.prevent="registerUser" >
        <label for="name">Name</label>
        <input type="text" name="" id="name" v-model="name" /><br />
        <label for="location">Location</label>
        <input type="text" name="" id="location" v-model="location" /><br />
        <button type="submit">Submit</button>
      </form>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"
      integrity="sha512-Wx8niGbPNCD87mSuF0sBRytwW2+2ZFr7HwVDF8krCb3egstCc4oQfig+/cfg2OHd82KcUlOYxlSDAqdHqK5TCw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.8/axios.js"
      integrity="sha512-+dJa1RvuE8/HFftifMtr7hqixdEkb/DizfXUZAA0pyZeVdNnyZyKy9RnIWi0JSWUznbCNbaQNn0E6nbtrdL+9g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script>
      new Vue({
        el: "#app",
        data: {
          name: "",
          location: "",
        },
        methods: {
          registerUser() {
            if (this.name === "" || this.location === "") {
              alert("All fields required.");
            } else {
              response = axios.post("http://127.0.0.1:5000/users", {
                name: this.name,
                location: this.location,
              });
              console.log(response);
            }
          },
        },
      });
    </script>
  </body>
</html>
